<!DOCTYPE html>

<head>

<title>英语学习游戏 - AI English Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Comic Sans MS","Microsoft YaHei",sans-serif; background:linear-gradient(135deg,#1e3a5f,#2563eb); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }

.game .emoji { font-size:28px; display:block; margin-bottom:4px; }
.game .desc { font-size:13px; opacity:.85; font-weight:normal; margin-top:4px; }
.g1 { background:linear-gradient(135deg,#6366f1,#8b5cf6); }

<body>
<div class="card">
  <h1>🎮 英语学习游戏</h1>
  <h2>Unit 1 — People at Work · 外研版四年级下册</h2>

  <a href="game1-vocabulary.html" class="game g1">
    <span class="emoji">🩺</span>职业词汇大闯关
    <div class="desc">3关闯关：看图选词 → 听音选词 → 拼写挑战</div>

  </a>

  <a href="game3-sentence.html" class="game g3">

    <div class="desc">拖词造句：What's your father's job?</div>
  </a>

  <p style="margin-top:20px; font-size:12px; color:#94a3b8;">点击游戏卡片即可开始 👆</p>
</div>
