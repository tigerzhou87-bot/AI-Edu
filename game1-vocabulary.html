<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>👷 职业词汇大闯关 - Unit 1 People at Work</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body { font-family:"Comic Sans MS","Microsoft YaHei",sans-serif; background:linear-gradient(135deg,#1e3a5f,#2563eb); overflow:hidden; position:fixed; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
#game { width:100%; max-width:480px; height:100%; padding:15px; display:flex; flex-direction:column; align-items:center; }
#header { width:100%; display:flex; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
.badge { background:rgba(255,255,255,.9); padding:10px 16px; border-radius:20px; font-size:16px; font-weight:bold; box-shadow:0 3px 10px rgba(0,0,0,.15); }
.badge span { margin-left:4px; }
#score { color:#10b981; } #level { color:#8b5cf6; } #streak { color:#f59e0b; }
#questionArea { background:rgba(255,255,255,.95); padding:24px; border-radius:24px; margin-bottom:16px; box-shadow:0 8px 25px rgba(0,0,0,.2); text-align:center; width:100%; }
#mainDisplay { font-size:72px; margin-bottom:12px; min-height:100px; display:flex; align-items:center; justify-content:center; }
#mainDisplay img { width:120px; height:120px; border-radius:16px; object-fit:contain; }
#subDisplay { font-size:22px; color:#475569; min-height:32px; }
#options { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
.opt { padding:16px 12px; border-radius:16px; font-size:18px; font-weight:bold; cursor:pointer; transition:all .2s; text-align:center; border:none; color:white; background:linear-gradient(135deg,#6366f1,#8b5cf6); box-shadow:0 4px 12px rgba(0,0,0,.2); min-height:56px; display:flex; align-items:center; justify-content:center; }
.opt:active { transform:scale(.96); }
.opt.correct { background:linear-gradient(135deg,#22c55e,#10b981)!important; animation:bounce .5s; }
.opt.wrong { background:linear-gradient(135deg,#ef4444,#dc2626)!important; animation:shake .5s; }
@keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
#letters { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:12px; }
.letter { width:44px; height:44px; background:white; border:2px solid #cbd5e1; border-radius:10px; font-size:20px; font-weight:bold; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; position:relative; }
.letter.selected { background:#6366f1; color:white; border-color:#6366f1; }
.letter.selected::after { content:attr(data-pos); position:absolute; top:-8px; right:-6px; width:18px; height:18px; background:#4f46e5; color:white; font-size:11px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
#spellDisplay { font-size:32px; letter-spacing:3px; min-height:48px; color:#1e293b; margin-bottom:8px; }
#hintBtn { margin-top:12px; padding:8px 20px; border-radius:20px; border:2px solid #6366f1; background:white; color:#6366f1; font-size:14px; cursor:pointer; }
#msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); padding:16px 32px; border-radius:20px; font-size:24px; font-weight:bold; z-index:100; pointer-events:none; opacity:0; transition:opacity .3s; }
#msg.show { opacity:1; }
#endPanel { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; align-items:center; justify-content:center; }
#endPanel.show { display:flex; }
#endCard { background:white; padding:32px; border-radius:24px; text-align:center; max-width:360px; width:90%; }
#endCard h2 { font-size:28px; margin-bottom:16px; }
#endCard p { font-size:18px; margin:6px 0; color:#475569; }
#endCard button { margin-top:20px; padding:14px 40px; border-radius:24px; border:none; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white; font-size:20px; font-weight:bold; cursor:pointer; }
#levelBar { width:100%; display:flex; gap:6px; margin-bottom:12px; }
#levelBar .dot { flex:1; height:6px; border-radius:3px; background:#cbd5e1; transition:background .3s; }
#levelBar .dot.done { background:#10b981; }
#levelBar .dot.current { background:#6366f1; }
</style>
</head>
<body>

<div id="game">
  <div id="levelBar"><div class="dot current"></div><div class="dot"></div><div class="dot"></div></div>
  <div id="header">
    <div class="badge">⭐ <span id="score">0</span></div>
    <div class="badge">🎯 <span id="level">Lv.1 看图选词</span></div>
    <div class="badge">🔥 <span id="streak">0</span></div>
  </div>
  <div id="questionArea">
    <div id="mainDisplay"></div>
    <div id="subDisplay"></div>
  </div>
  <div id="options"></div>
  <div id="spellDisplay"></div>
  <div id="letters"></div>
  <button id="hintBtn" style="display:none">💡 提示</button>
</div>

<div id="msg"></div>
<div id="endPanel">
  <div id="endCard">
    <h2>🎉 闯关完成！</h2>
    <p>⭐ 总分：<strong id="finalScore"></strong></p>
    <p>✅ 正确率：<strong id="finalAcc"></strong></p>
    <p>🏆 评级：<strong id="finalGrade"></strong></p>
    <button onclick="location.reload()">🔄 再来一次</button>
  </div>
</div>

<script>
// ============ UNIT 1 VOCABULARY ============
const vocab = [
  { word:'Doctor', cn:'医生', emoji:'🩺', hint:'works in a hospital, helps sick people' },
  { word:'Nurse', cn:'护士', emoji:'💊', hint:'takes care of patients, gives medicine' },
  { word:'Police', cn:'警察', emoji:'🚔', hint:'protects people, works in a police station' },
  { word:'Driver', cn:'司机', emoji:'🚌', hint:'drives a bus or taxi' },
  { word:'Cook', cn:'厨师', emoji:'🍳', hint:'cooks food, works in a restaurant' },
  { word:'Farmer', cn:'农民', emoji:'🌾', hint:'grows vegetables, works on a farm' },
  { word:'Teacher', cn:'教师', emoji:'📚', hint:'teaches students, works at school' },
  { word:'Worker', cn:'工人', emoji:'🔧', hint:'makes things, works in a factory' }
];

const workplaces = [
  { name:'Hospital', cn:'医院', emoji:'🏥' },
  { name:'School', cn:'学校', emoji:'🏫' },
  { name:'Farm', cn:'农场', emoji:'🌾' },
  { name:'Office', cn:'办公室', emoji:'🏢' },
  { name:'Police station', cn:'警察局', emoji:'🚔' },
  { name:'Factory', cn:'工厂', emoji:'🏭' },
  { name:'Restaurant', cn:'餐厅', emoji:'🍽️' }
];

const jobPlaceMap = {
  Doctor:'Hospital', Nurse:'Hospital', Cook:'Restaurant',
  Teacher:'School', Farmer:'Farm', Worker:'Factory',
  Police:'Police station', Driver:'Office'
};

// ============ GAME STATE ============
let state = {
  score:0, streak:0, level:1, progress:0, correctCount:0,
  totalWords:0, currentWord:null, wordQueue:[]
};

const $ = id => document.getElementById(id);

function shuffle(a) { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }

function speak(text) {
  if('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

function showMsg(text,cls='') {
  const m = $('msg');
  m.textContent=text; m.className=cls+' show';
  setTimeout(()=>m.className='',1500);
}

function updateUI() {
  $('score').textContent=state.score;
  $('streak').textContent=state.streak;
  $('level').textContent='Lv.'+state.level+{1:'看图选词',2:'听音选词',3:'拼写挑战'}[state.level];
  // level dots
  const dots = document.querySelectorAll('#levelBar .dot');
  dots.forEach((d,i)=>{
    d.className='dot';
    if(i+1<state.level) d.classList.add('done');
    if(i+1===state.level) d.classList.add('current');
  });
}

function nextQuestion() {
  if(state.progress>=15) { endGame(); return; }
  state.progress++;
  if(state.progress===6) { state.level=2; nextQuestion(); return; }
  if(state.progress===11) { state.level=3; nextQuestion(); return; }

  state.wordQueue = shuffle([...vocab]).slice(0,4);
  state.currentWord = state.wordQueue[0];

  $('options').innerHTML='';
  $('letters').innerHTML='';
  $('spellDisplay').textContent='';
  $('hintBtn').style.display='none';
  $('subDisplay').textContent='';
  $('options').style.display='grid';
  $('spellDisplay').style.display='none';
  $('letters').style.display='none';

  if(state.level===1) setupLevel1();
  else if(state.level===2) setupLevel2();
  else setupLevel3();
  updateUI();
}

function setupLevel1() {
  $('mainDisplay').innerHTML='<span style="font-size:80px">'+state.currentWord.emoji+'</span>';
  const opts = shuffle([...state.wordQueue]);
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className='opt'; btn.textContent=o.word;
    btn.onclick=()=>checkAnswer(btn,o.word===state.currentWord.word);
    $('options').appendChild(btn);
  });
}

function setupLevel2() {
  $('mainDisplay').innerHTML='<span style="font-size:60px">🔊</span>';
  $('subDisplay').textContent='仔细听，选出你听到的单词';
  speak(state.currentWord.word);
  const opts = shuffle([...state.wordQueue]);
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className='opt'; btn.textContent=o.word;
    btn.onclick=()=>checkAnswer(btn,o.word===state.currentWord.word);
    $('options').appendChild(btn);
  });
}

let selectedOrder = []; // track click order, not DOM order

function setupLevel3() {
  $('mainDisplay').innerHTML='<span style="font-size:60px">'+state.currentWord.emoji+'</span>';
  $('subDisplay').textContent='拼出这个职业的英文单词（按顺序逐个点击字母）';
  $('options').style.display='none';
  $('spellDisplay').style.display='block';
  $('letters').style.display='flex';
  $('hintBtn').style.display='inline-block';
  selectedOrder = [];

  const letters = state.currentWord.word.split('').sort(()=>Math.random()-.5);
  $('letters').innerHTML='';
  letters.forEach((l,i)=>{
    const tile = document.createElement('div');
    tile.className='letter'; tile.textContent=l; tile.dataset.idx=i;
    tile.onclick=()=>{
      if(tile.classList.contains('selected')) {
        // unselect: remove from order
        tile.classList.remove('selected');
        selectedOrder = selectedOrder.filter(s=>s.idx!==i);
      } else {
        tile.classList.add('selected');
        selectedOrder.push({idx:i, letter:l});
      }
      updateSpelling();
      // re-number selected tiles
      document.querySelectorAll('.letter.selected').forEach(t=>t.style.setProperty('--order',''));
      selectedOrder.forEach((s,pos)=>{
        const t = document.querySelector('.letter[data-idx="'+s.idx+'"]');
        if(t) { t.style.setProperty('--order',pos+1); t.setAttribute('data-pos',pos+1); }
      });
    };
    tile.style.position='relative';
    $('letters').appendChild(tile);
  });
}

function updateSpelling() {
  const selected = selectedOrder.map(s=>s.letter).join('');
  $('spellDisplay').textContent=selected||'_ _ _ _';
  if(selected===state.currentWord.word) handleCorrect();
}

function handleCorrect() {
  state.streak++; state.correctCount++; state.totalWords++;
  const bonus = state.streak>=3?30:0;
  state.score += {1:10,2:15,3:20}[state.level]+bonus;
  showMsg('✅ 正确！'+(bonus?' +'+bonus+' 连击奖励':''));
  document.querySelectorAll('.opt').forEach(b=>{
    if(b.textContent===state.currentWord.word) b.classList.add('correct');
  });
  speak('Great job! '+state.currentWord.word);
  setTimeout(nextQuestion,1200);
}

function checkAnswer(btn,correct) {
  state.totalWords++;
  if(correct) {
    btn.classList.add('correct');
    state.streak++; state.correctCount++;
    const bonus = state.streak>=3?30:0;
    state.score += {1:10,2:15,3:20}[state.level]+bonus;
    showMsg('✅ 正确！'+(bonus?' +'+bonus+' 连击奖励':''));
    speak('Correct! '+state.currentWord.word);
  } else {
    btn.classList.add('wrong');
    state.streak=0;
    state.score = Math.max(0,state.score-5);
    showMsg('❌ 再试试！');
    document.querySelectorAll('.opt').forEach(b=>{
      if(b.textContent===state.currentWord.word) b.classList.add('correct');
    });
  }
  // disable all
  document.querySelectorAll('.opt').forEach(b=>b.style.pointerEvents='none');
  updateUI();
  setTimeout(nextQuestion,1500);
}

function endGame() {
  $('endPanel').classList.add('show');
  const acc = Math.round(state.correctCount/state.totalWords*100);
  $('finalScore').textContent=state.score;
  $('finalAcc').textContent=acc+'%';
  let grade = acc>=90?'S':acc>=80?'A':acc>=65?'B':'C';
  $('finalGrade').textContent=grade+(acc>=90?' 🏆':'');
}

// HINT
$('hintBtn').onclick=()=>showMsg('💡 '+state.currentWord.hint);

// Reset spelling when clicking outside
document.addEventListener('click',e=>{
  if(!e.target.closest('.letter')) {
    document.querySelectorAll('.letter.selected').forEach(l=>l.classList.remove('selected'));
    selectedOrder=[];
    $('spellDisplay').textContent='_ _ _ _';
  }
});

// START
speak('Welcome! Unit 1 - People at Work. Choose the correct word!');
nextQuestion();
updateUI();
</script>
</body>
</html>
